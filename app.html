<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Secure Workspace Array</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-black: #000000;
            --border-thin: #222226;
            --text-primary: #E7E9EA;
            --text-muted: #71717A;
            --gray-hover: #161618;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body {
            background-color: var(--bg-black);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .sidebar {
            width: 100%;
            max-width: 400px;
            background: var(--bg-black);
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            height: 100vh;
            justify-content: space-between;
        }
        .brand-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; color: #FFFFFF; text-align: center; }
        .brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; text-align: center; letter-spacing: 0.5px; text-transform: uppercase; }
        .nav-links { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; flex-grow: 1; overflow-y: auto; }
        .nav-link-item {
            background: transparent;
            border: 1px solid var(--border-thin);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 700;
            display: block;
            width: 100%;
            transition: all 0.2s;
            letter-spacing: -0.3px;
        }
        .nav-link-item:hover { background: var(--gray-hover); border-color: var(--text-primary); }
        .secure-footer { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-align: center; text-transform: uppercase; margin-top: 15px; }
        
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000; display: flex; justify-content: center;
            align-items: center; z-index: 99999; transition: opacity 0.5s ease;
        }
        #splash img { width: 80px; height: 80px; }
    </style>
</head>
<body>

    <div id="splash"><img src="icon.png" alt="Axiom"></div>

    <div class="sidebar">
        <div>
            <div class="brand-title">Axiom Shield</div>
            <div class="brand-sub">Sovereign Mobile Workspace</div>
            
            <div class="nav-links">
                <a href="https://web.telegram.org/k/" target="_blank" class="nav-link-item">> Sovereign Messenger</a>
                <a href="https://whatsapp.com" target="_blank" class="nav-link-item">> Enencrypted WhatsApp Array</a>
                <a href="https://chatgpt.com" target="_blank" class="nav-link-item">> Private ChatGPT Node</a>
                <a href="https://duckduckgo.com" target="_blank" class="nav-link-item">> Sovereign Browser (Uncensored)</a>
                <a href="https://tiktok.com" target="_blank" class="nav-link-item">> Sandboxed TikTok Grid</a>
                <a href="https://instagram.com" target="_blank" class="nav-link-item">> Sandboxed WebGrid</a>
            </div>
        </div>

        <div class="secure-footer">
            [SECURITY: ISO-LOCKED ARRAY]
        </div>
    </div>

    <script>
        setTimeout(() => {
            const s = document.getElementById('splash');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
        }, 1500);
    </script>
</body>
</html>
