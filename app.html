<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Secure Workspace Array</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-black: #000000;
            --border-thin: #222226;
            --text-primary: #E7E9EA;
            --text-muted: #71717A;
            --gray-hover: #161618;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body {
            background-color: var(--bg-black);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .sidebar {
            width: 100%;
            max-width: 400px;
            background: var(--bg-black);
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            height: 100vh;
            justify-content: space-between;
        }
        .brand-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; color: #FFFFFF; text-align: center; }
        .brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; text-align: center; letter-spacing: 0.5px; text-transform: uppercase; }
        .nav-links { display: flex; flex-direction: column; gap: 12px; margin-top: 40px; flex-grow: 1; }
        .nav-link-item {
            background: transparent;
            border: 1px solid var(--border-thin);
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            display: block;
            width: 100%;
            transition: all 0.2s;
            letter-spacing: -0.3px;
        }
        .nav-link-item:hover { background: var(--gray-hover); border-color: var(--text-primary); }
        .secure-footer { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand-title">Axiom Shield</div>
            <div class="brand-sub">Sovereign Mobile Workspace</div>
            
            <div class="nav-links">
                <a href="https://telegram.org" target="_blank" class="nav-link-item">> Sovereign Messenger</a>
                <a href="https://discord.com" target="_blank" class="nav-link-item">> Isolated Comm-Grid</a>
                <a href="https://chatgpt.com" target="_blank" class="nav-link-item">> Private AI Node</a>
                <a href="https://duckduckgo.com" target="_blank" class="nav-link-item">> Sovereign Browser</a>
                <a href="https://instagram.com" target="_blank" class="nav-link-item">> Sandboxed WebGrid</a>
            </div>
        </div>

        <div class="secure-footer">
            [SECURITY: ISO-LOCKED ARRAY]
        </div>
    </div>

</body>
</html>
