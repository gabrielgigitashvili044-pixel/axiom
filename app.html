<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Secure Workspace Array</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-black: #000000;
            --border-thin: #222226;
            --text-primary: #E7E9EA;
            --text-muted: #71717A;
            --gray-hover: #161618;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body {
            background-color: var(--bg-black);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 275px;
            background: var(--bg-black);
            border-right: 1px solid var(--border-thin);
            display: flex;
            flex-direction: column;
            padding: 24px;
            justify-content: space-between;
            height: 100vh;
            flex-shrink: 0;
        }
        .brand-title { font-size: 26px; font-weight: 900; letter-spacing: -1px; color: #FFFFFF; padding-left: 12px; }
        .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 600; padding-left: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
        .nav-links { display: flex; flex-direction: column; gap: 8px; margin-top: 30px; flex-grow: 1; }
        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 9999px;
            cursor: pointer;
            text-align: left;
            font-size: 19px;
            font-weight: 700;
            display: block;
            width: 100%;
            transition: background 0.2s;
            letter-spacing: -0.3px;
        }
        .nav-btn:hover { background: var(--gray-hover); }
        .nav-btn.active { background: var(--gray-hover); color: #FFFFFF; }
        
        .view-container {
            flex-grow: 1;
            height: 100vh;
            background: var(--bg-black);
            position: relative;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #000;
        }
        iframe.active { display: block; }

        /* Mobile optimization: auto-collapse sidebar if screen is too narrow */
        @media (max-width: 600px) {
            .sidebar { width: 80px; padding: 10px; }
            .brand-title, .brand-sub, .nav-btn span { display: none; }
            .nav-btn { text-align: center; padding: 10px 0; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand-title">Axiom</div>
            <div class="brand-sub">Devnet Array v1.2.0</div>
            
            <div class="nav-links">
                <button class="nav-btn active" onclick="switchTab('tg', 'https://telegram.org')"><span>Sovereign Messenger</span></button>
                <button class="nav-btn" onclick="switchTab('discord', 'https://discord.com')"><span>Isolated Comm-Grid</span></button>
                <button class="nav-btn" onclick="switchTab('gpt', 'https://chatgpt.com')"><span>Private AI Node</span></button>
                <button class="nav-btn" onclick="switchTab('ddg', 'https://duckduckgo.com')"><span>Sovereign Browser</span></button>
                <button class="nav-btn" onclick="switchTab('insta', 'https://instagram.com')"><span>Sandboxed WebGrid</span></button>
            </div>
        </div>

        <div style="font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; padding-left: 12px;">
            [SECURITY]
        </div>
    </div>

    <div class="view-container">
        <iframe id="wv-tg" class="active" src="https://telegram.org"></iframe>
        <iframe id="wv-discord" src="https://discord.com"></iframe>
        <iframe id="wv-gpt" src="https://chatgpt.com"></iframe>
        <iframe id="wv-ddg" src="https://duckduckgo.com"></iframe>
        <iframe id="wv-insta" src="https://instagram.com"></iframe>
    </div>

    <script>
        function switchTab(tabId, url) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(wv => wv.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            const targetWv = document.getElementById('wv-' + tabId);
            targetWv.classList.add('active');
            if(!targetWv.src) { targetWv.src = url; }
        }
    </script>
</body>
</html>
